# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=${PORT:8080}
server.error.include-stacktrace=never
server.servlet.context-path=/

# ===========================================
# DATABASE CONFIGURATION (POSTGRESQL)
# ===========================================
# Heroku ????????????? ????????????? DATABASE_URL
# ??????: postgres://username:password@host:port/database
# Spring Boot ????????????? ?????? ??? ??????????
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/email_spam_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ===========================================
# JPA / HIBERNATE CONFIGURATION
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===========================================
# SWAGGER / OPENAPI CONFIGURATION
# ===========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ===========================================
# JWT SECURITY CONFIGURATION
# ===========================================
jwt.secret=${JWT_SECRET:ThisIsASecretKeyForJWTTokenGenerationPleaseChangeThisInProduction}
jwt.expiration=86400000

# ===========================================
# LOGGING CONFIGURATION
# ===========================================
logging.level.root=WARN
logging.level.com.example=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR

# ===========================================
# SPRING SECURITY
# ===========================================
spring.security.filter.dispatcher-types=REQUEST,ASYNC,ERROR

# ===========================================
# APPLICATION SPECIFIC
# ===========================================
app.name=Email Spam API
app.version=1.0.0